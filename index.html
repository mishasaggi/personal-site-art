<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Things I've Made</title>
</head>

<body>

  <div class="overlay">
    <div class="overlay-inner">
      <button class="close">× Close</button>
      <img>
    </div>
  </div>

  <section class="gallery">
  </section>


  <style>
    * {
      box-sizing: border-box;
    }

    body {
      padding: 100px 50px;
      max-width: 4000px;
      margin: 0 auto;
      font-family: sans-serif;
      /* background: linear-gradient(to right, #CACFD2, #ECF0F1); */
      background: #ECF0F1;
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      margin: 0 0 5px 0;
    }

    p {
      margin: 0 0 20px 0;
    }

    .close {
      background: none;
      color: black;
      border: 0;
    }

    .gallery {
      display: grid;
      grid-gap: 15px;
      grid-template-columns: repeat(auto-fill, 100px);
      grid-auto-rows: 100px;
      grid-auto-flow: dense;
    }

    .item {
      overflow: hidden;
      display: grid;
      grid-template-columns: 1;
      grid-template-rows: 1;
    }

    .item img {
      grid-column: 1 / -1;
      grid-row: 1 / -1;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .item__overlay {
      background: #22222282;
      grid-column: 1 / -1;
      grid-row: 1 / -1;
      position: relative;
      display: grid;
      justify-items: center;
      align-items: center;
      transition: 0.2s;
      transform: translateY(100%);
    }

    .item__overlay button {
      background: none;
      border: 2px solid white;
      color: white;
      text-transform: uppercase;
      background: rgba(0, 0, 0, 0.7);
      padding: 5px;
    }

    .item:hover .item__overlay {
      transform: translateY(0);
    }


    .item.v2 {
      grid-row: span 2;
    }

    .item.v3 {
      grid-row: span 3;
    }

    .item.v4 {
      grid-row: span 4;
    }

    .item.h2 {
      grid-column: span 2;
    }

    .item.h3 {
      grid-column: span 3;
    }

    .item.h4 {
      grid-column: span 4;
    }


    .overlay {
      position: fixed;
      background: rgba(0, 0, 0, 0.75);
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      display: none;
      z-index: 2;
    }

    .overlay.open {
      display: grid;
      align-items: center;
      justify-items: center;
    }

    .overlay-inner {
      background: #CACFD2;
      width: 700px;
      padding: 20px;
    }

    .overlay img {
      width: 100%;
    }
  </style>

  <script>
    const gallery = document.querySelector('.gallery');
    const overlay = document.querySelector('.overlay');
    const overlayImage = overlay.querySelector('img');
    const overlayClose = overlay.querySelector('.close');

    console.log('Welcome to my art gallery! I know the pictures have pretty inconsistent lighting and resolutions. For my future projects I will learn how to take good pictures :)')

    function generateHTML([h, v], image) {
      return `
        <div class="item h${h} v${v}">
          <img src="images/${image}">
          <div class="item__overlay">
            <button>View →</button>
          </div>
        </div>
      `;
    }

    function randomNumber(limit) {
      return Math.floor(Math.random() * limit) + 1;
    }

    // second approach
    const images = Array.from({ length: 41 }, (_, i) => `${i + 1}.jpg`);
    const counts = {};
    images.forEach(img => counts[img] = 0);
    let seen = new Set();

    function pickImage() {
      let pool;
      const unseen = images.filter(img => !seen.has(img)); // array
      const underLimit = images.filter(img => counts[img] < 2); // array
      const aboutToExceed = images.some(img => counts[img] === 2); //boolean

      if (unseen.length > 0 && aboutToExceed) {
        //prioritize unseen images
        pool = unseen;
      } else if (underLimit.length > 0) {
        // prefer images under the repetition limit
        pool = underLimit;
      } else {
        // everything has been seen and used, use full randomness for further repetition
        pool = images
      }
      const choice = pool[Math.floor(Math.random() * pool.length)];
      counts[choice]++;
      seen.add(choice);

      return choice;
    }

    function handleClick(e) {
      const src = e.currentTarget.querySelector('img').src;
      overlayImage.src = src;
      overlay.classList.add('open');
    }

    function close() {
      overlay.classList.remove('open');
    }

    // create layout with varying h and v spans where (sometimes randomly) picked image is added
    const gridLayouts = Array.from({ length: 123 }, () => [randomNumber(4), randomNumber(4)])
      .concat(Array.from({ length: 18 }, () => [1, 1]));

    const gridLayoutHtml = gridLayouts.map(layout => generateHTML(layout, pickImage())).join('');
    gallery.innerHTML = gridLayoutHtml;

    const items = document.querySelectorAll('.item');
    items.forEach(item => item.addEventListener('click', handleClick));
    overlayClose.addEventListener('click', close);

  </script>
</body>
</html>
